name: Release Workflow

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 19.3.0)'
        required: true
      body:
        description: 'Release notes'
        required: false
        default: ''
      prerelease:
        description: 'Is this a pre-release?'
        required: false
        type: boolean
        default: false

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[REL]')
    runs-on: ubuntu-latest
    outputs:
      version:    ${{ steps.parse.outputs.version }}
      body:       ${{ steps.parse.outputs.body }}
      prerelease: ${{ steps.parse.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          registry-url: 'https://registry.npmjs.org'

      - name: Parse (push trigger)
        id: parse
        if: github.event_name == 'push'
        run: |
          npm i @actions/core@3.0.0 @actions/github@9.0.0 --no-save && \
          node tools/parse_message.mjs

      - name: Parse (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "version=${{ inputs.version }}"    >> $GITHUB_OUTPUT
          echo "body=${{ inputs.body }}"          >> $GITHUB_OUTPUT
          echo "prerelease=${{ inputs.prerelease }}" >> $GITHUB_OUTPUT

      - name: Build
        run: npm ci && npm run dist

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ./dist

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./dist

      - name: Release
        uses: ncipollo/release-action@v1.12.0
        with:
          tag:        ${{ needs.build.outputs.version }}
          body:       ${{ needs.build.outputs.body }}
          artifacts:  './dist/*.*'
          makeLatest: false
          prerelease: ${{ needs.build.outputs.prerelease }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          registry-url: 'https://registry.npmjs.org'

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./dist

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
