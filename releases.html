<!DOCTYPE html>
<html lang="en" data-bs-theme="auto">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Releases · odoo/o-spreadsheet</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

  <style>
    code, .font-monospace { font-size: .85em; }

    .page-header {
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--bs-border-color);
      background: var(--bs-body-bg);
    }

    .accordion-button { font-family: var(--bs-font-monospace); font-weight: 500; }
    .accordion-button:not(.collapsed) { box-shadow: none; }

    .release-row td { vertical-align: middle; padding: .6rem .75rem; }
    .release-row:last-child td { border-bottom: 0; }

    .tag-link { text-decoration: none; }
    .tag-link:hover { text-decoration: underline; }

    .stat-val { font-size: 1.5rem; font-weight: 600; line-height: 1.1; }
    .stat-lbl { font-size: .7rem; text-transform: uppercase; letter-spacing: .06em; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .accordion-item                  { animation: fadeUp .2s ease both; }
    .accordion-item:nth-child(2)     { animation-delay: .04s; }
    .accordion-item:nth-child(3)     { animation-delay: .08s; }
    .accordion-item:nth-child(4)     { animation-delay: .12s; }
    .accordion-item:nth-child(5)     { animation-delay: .16s; }
  </style>
</head>
<body>

<!-- ── HEADER ──────────────────────────────────────────────── -->
<header class="page-header py-3">
  <div class="container-lg">
    <div class="d-flex flex-wrap align-items-center gap-3">

      <div class="me-auto">
        <p class="text-secondary font-monospace mb-0"
           style="font-size:.7rem;letter-spacing:.08em;text-transform:uppercase"
           id="repo-label">loading…</p>
        <h1 class="h4 mb-0 fw-semibold">Release history</h1>
      </div>

      <!-- Search -->
      <div class="input-group input-group-sm" style="width:220px">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input type="search" id="search" class="form-control"
               placeholder="Search releases…" autocomplete="off" />
      </div>

      <!-- Filter pills -->
      <div class="btn-group btn-group-sm" role="group" aria-label="Release filter">
        <input type="radio" class="btn-check" name="filter" id="f-all"    autocomplete="off" checked />
        <label class="btn btn-outline-secondary" for="f-all"    data-f="all">All</label>

        <input type="radio" class="btn-check" name="filter" id="f-stable" autocomplete="off" />
        <label class="btn btn-outline-secondary" for="f-stable" data-f="stable">Stable</label>

        <input type="radio" class="btn-check" name="filter" id="f-latest" autocomplete="off" />
        <label class="btn btn-outline-secondary" for="f-latest" data-f="latest">Latest per version</label>
      </div>

    </div>
  </div>
</header>

<!-- ── MAIN ────────────────────────────────────────────────── -->
<main class="container-lg py-4" id="main">
  <div class="text-center text-secondary py-5">
    <div class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></div>
    Fetching releases…
  </div>
</main>

<!-- ── FOOTER ──────────────────────────────────────────────── -->
<footer class="border-top text-center text-secondary py-3" style="font-size:.8rem">
  Data via <a href="https://docs.github.com/en/rest/releases" target="_blank" rel="noopener"
    class="text-secondary">GitHub Releases API</a>
  &nbsp;·&nbsp; refreshes on each page load
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="releases.js"></script>
</body>
</html>
